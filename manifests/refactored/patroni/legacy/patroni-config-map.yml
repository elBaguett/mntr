apiVersion: v1
kind: ConfigMap
metadata:
  name: patroni-config
data:
  patroni.yaml: |
    scope: pg-cluster
    name: ${POD_NAME}
    restapi:
      listen: 0.0.0.0:8008
      connect_address: ${POD_IP}:8008

    etcd3:
      hosts:
        - 10.0.20.11:2379
        - 10.0.20.10:2379
      protocol: https
      cacert: /etc/kubernetes/pki/etcd/ca.crt
      cert: /etc/kubernetes/pki/etcd/server.crt
      key: /etc/kubernetes/pki/etcd/server.key    

    bootstrap:
      dcs:
        ttl: 30
        loop_wait: 10
        retry_timeout: 10
      initdb:
        - encoding: UTF8
        - locale: en_US.UTF-8
        - auth-host: md5
        - auth-local: trust
      users:
        replicator:
          password: replpassword
          options:
            - replication        

    postgresql:
      listen: 0.0.0.0:5432
      connect_address: ${POD_IP}:5432
      data_dir: /var/lib/postgresql/data
      authentication:
        superuser:
          username: postgres
          password: password
        replication:
          username: replicator
          password: replpassword
      parameters:
        wal_level: replica
        hot_standby: "on"
        max_wal_senders: 5
      
      pg_hba:
        - local all all trust
        - host all all 0.0.0.0/0 md5
        - host replication replicator all md5
        - hostssl replication replicator all md5
        - host all all all md5  